<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maze-O Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Maze-O Generator</h1>
    <p>Enter up to 4 words (max 8 letters each) to place in a 5&times;5 letter grid.</p>
  </header>

  <div class="card">
    <h2>Words</h2>
    <textarea id="words-input" placeholder="Enter words, one per line&#10;&#10;HELPFUL&#10;THRIFTY&#10;BRAVE"></textarea>
    <div class="input-row">
      <button id="generate-btn">Generate Maze</button>
      <button id="print-btn">Print</button>
      <div id="error-msg"></div>
    </div>
  </div>

  <div id="output" class="card">
    <h2>Maze</h2>
    <div class="output-layout">
      <div class="grid-wrap">
        <div class="puzzle-area">
          <div class="start-box" id="start-box">
            <span class="box-symbol">▲</span>
            <span class="box-label">start</span>
          </div>
          <div id="grid" class="grid"></div>
          <div class="end-box" id="end-box">
            <span class="box-symbol">⊙</span>
            <span class="box-label">end</span>
          </div>
          <svg id="word-path" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <p class="grid-hint">Click a word to highlight it.</p>
        <label class="toggle-label">
          <input type="checkbox" id="dots-toggle">
          <span class="toggle-track"></span>
          Hide letters
        </label>
      </div>
      <div id="word-list" class="word-list"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
